<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR App</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: black;
        color: white;
        text-align: center;
    }

    #reader {
        width: 100%;
        max-width: 400px;
        margin: auto;
    }

    #visor {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
        background: black;
    }

    #overlay {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10;
        display: none;
    }

    button {
        padding: 10px;
        background: red;
        border: none;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>📷 Escanea un QR</h2>

<div id="reader"></div>

<!-- Botón para regresar -->
<div id="overlay">
    <button onclick="cerrarVisor()">⬅ Volver</button>
</div>

<iframe id="visor"></iframe>

<script>
let abierto = false;

function onScanSuccess(texto) {

    if (abierto) return; // evitar múltiples aperturas
    abierto = true;

    const visor = document.getElementById("visor");
    const overlay = document.getElementById("overlay");

    // detener cámara
    html5QrCode.stop();

    // mostrar visor
    visor.style.display = "block";
    overlay.style.display = "block";

    if (texto.startsWith("http")) {
        visor.src = texto;
    } else {
        visor.srcdoc = `<h1 style="color:white;">${texto}</h1>`;
    }
}

function cerrarVisor() {
    const visor = document.getElementById("visor");
    const overlay = document.getElementById("overlay");

    visor.style.display = "none";
    overlay.style.display = "none";
    visor.src = "";

    abierto = false;

    // volver a activar cámara
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

const html5QrCode = new Html5Qrcode("reader");

// 🔥 cámara trasera + auto escaneo
html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
).catch(err => console.log(err));

</script>

</body>
</html>
