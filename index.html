<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escáner QR WebApp</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
    }

    h2 {
        padding: 10px;
    }

    #reader {
        width: 100%;
        max-width: 400px;
        margin: auto;
    }

    #result {
        margin-top: 10px;
        padding: 10px;
        background: #222;
        word-break: break-all;
    }

    iframe {
        width: 100%;
        height: 80vh;
        border: none;
        margin-top: 10px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        background: #00c853;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>📷 Escáner QR Web</h2>

<div id="reader"></div>

<div id="result">Esperando escaneo...</div>

<button onclick="abrirContenido()">Abrir en la app</button>

<iframe id="visor"></iframe>

<script>
let ultimoResultado = "";

function onScanSuccess(decodedText) {
    ultimoResultado = decodedText;
    document.getElementById("result").innerText = "QR detectado: " + decodedText;
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            devices[0].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess
        );
    }
}).catch(err => {
    console.log(err);
});

function abrirContenido() {
    if (!ultimoResultado) {
        alert("Escanea un QR primero");
        return;
    }

    const visor = document.getElementById("visor");

    // Si es URL
    if (ultimoResultado.startsWith("http")) {
        visor.src = ultimoResultado;
    } else {
        // Si es texto normal
        visor.srcdoc = `<h1 style="color:white;">${ultimoResultado}</h1>`;
    }
}
</script>

</body>
</html>
