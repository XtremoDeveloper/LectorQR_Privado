<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escáner QR WebApp</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
    }

    #reader {
        width: 100%;
        max-width: 400px;
        margin: auto;
    }

    iframe {
        width: 100%;
        height: 80vh;
        border: none;
        margin-top: 10px;
    }

    button {
        padding: 10px;
        margin: 10px;
        background: #00c853;
        border: none;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>📷 Escáner QR (Cámara trasera)</h2>

<div id="reader"></div>

<button onclick="abrirContenido()">Abrir</button>

<iframe id="visor"></iframe>

<script>
let ultimoResultado = "";

function onScanSuccess(decodedText) {
    ultimoResultado = decodedText;
    console.log("QR:", decodedText);
}

const html5QrCode = new Html5Qrcode("reader");

// 🔥 USAR CÁMARA TRASERA
html5QrCode.start(
    { facingMode: "environment" }, // 👈 clave aquí
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
).catch(err => {
    console.log("Error al iniciar cámara:", err);
});

function abrirContenido() {
    if (!ultimoResultado) {
        alert("Escanea primero");
        return;
    }

    const visor = document.getElementById("visor");

    if (ultimoResultado.startsWith("http")) {
        visor.src = ultimoResultado;
    } else {
        visor.srcdoc = `<h1 style="color:white;">${ultimoResultado}</h1>`;
    }
}
</script>

</body>
</html>
